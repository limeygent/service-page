# Pediatric Ear Infection Treatment - Service Page Example
# Demonstrates: Progressive CTAs, MEET_THE_TEAM, LOCAL_KNOWLEDGE,
#   <details> FAQ with JSON-LD, MID_CTA bar, page-level modifiers
#
# Context:
#   Niche: pediatric_medical
#   Service: Ear infection treatment for children
#   City: Gotham, TX
#   Urgency: soon (hybrid - urgent sick visit + research for recurrent)
#   Stakes: high (child's health)
#   Regulated: true (medical)

---
page_metadata:
  niche: pediatric_medical
  intent_primary: schedule_soon
  urgency: soon
  city: Gotham
  state: TX
  business_name: "Gotham Pediatrics"

  modifiers:
    stakes: high
    regulated: true
    high_ticket: false
    recurring: false

  intent_analysis:
    observable: "ear infection treatment children gotham tx"
    inferred: commercial (schedule soon)
    hidden_drivers:
      emotional: [parental_anxiety, fear_of_childs_pain, uncertainty_about_severity]
      functional: [symptom_assessment, urgency_triage, treatment_expectations]

---
blocks:

  # Row 1: HERO
  # Progressive CTA Stage 1: Intent-Matching
  - block: HERO
    layout: "col-lg-7 text, col-lg-5 urgency card"
    heading: "Ear Infection Treatment for Children in Gotham, TX"
    subhead: "Same-day sick visits with board-certified pediatricians"
    explanation: "Your child is pulling at their ear, running a fever, and can't sleep. You need answers, not a waiting list. Dr. Smith and Dr. Chen offer same-day sick visits for ear infections, with on-site diagnosis and a treatment plan before you leave."
    badges:
      - "Board-Certified Pediatricians"
      - "Same-Day Sick Visits"
      - "Spanish, Mandarin Spoken"
    ctas:
      - text: "Call (555) 425-3600"   # Stage 1: Intent-matching
        variant: primary
        icon: telephone-fill
      - text: "Book Online"
        variant: outline-primary
        icon: calendar-plus
    right_column:
      type: urgency_checklist
      title: "When to Call Us Right Away"
      items:
        - "Child under 2 with ear pain or fever"
        - "Fluid or pus draining from the ear"
        - "Pain lasting more than 48 hours"
        - "Fever returning after initial improvement"
        - "Swelling or redness behind the ear"
    meclabs: [motivation_4x, value_prop_3x, -friction_2x]

  # Row 2: TRUST_BAR
  - block: TRUST_BAR
    stats:
      - number: "5.0"
        label: "Google Reviews"
        icon: star-fill
      - number: "Gotham Medical"
        label: "Hospital Affiliation"
        icon: hospital
      - number: "Birth-18"
        label: "Ages Treated"
        icon: person-check
      - number: "Same Day"
        label: "Sick Visit Availability"
        icon: clock

  # Row 3: SYMPTOM_MATRIX (by age group)
  - block: SYMPTOM_MATRIX
    title: "Ear Infection Signs by Age"
    note: "Organized by age group (parents think in terms of their child's age)"
    groups:
      - age: "Infants (0-12 months)"
        symptoms: ["Ear pulling/tugging", "Unusual fussiness", "Difficulty sleeping", "Fever over 100.4F", "Reduced feeding"]
      - age: "Toddlers (1-3 years)"
        symptoms: ["Complaining of ear pain", "Balance problems", "Hearing difficulty", "Fever", "Fluid draining from ear"]
      - age: "School-Age (4-12 years)"
        symptoms: ["Ear pain (can describe it)", "Fullness in ear", "Muffled hearing", "Headache", "Fever"]
    meclabs: [value_prop_3x, -friction_2x, -anxiety_2x]

  # Row 4: URGENCY_TRIAGE (custom block variant)
  - block: PATH_CHOICE
    variant: urgency_triage
    title: "What Should You Do Right Now?"
    paths:
      - level: home
        color: green
        title: "Watch and Wait at Home"
        when: ["Mild ear tugging without fever", "Child over 2 with mild symptoms less than 48 hours", "No fluid draining from ear"]
      - level: same_day
        color: amber
        title: "Call Us for a Same-Day Visit"
        when: ["Ear pain with fever over 100.4F", "Symptoms lasting more than 48 hours", "Child under 2 with any ear symptoms", "Recurrent infections (3+ in 6 months)"]
      - level: er
        color: red
        title: "Go to the Emergency Room"
        when: ["Fever over 104F", "Stiff neck or severe headache", "Swelling/redness spreading behind the ear", "Child is limp, unresponsive, or very difficult to wake"]

  # Row 5: PROCESS_TIMELINE
  - block: PROCESS_TIMELINE
    title: "What to Expect During Your Visit"
    steps:
      - step: 1
        title: "Call or Book Online"
        description: "Tell us about symptoms so we can prepare. Call before 4pm for same-day."
        icon: telephone
      - step: 2
        title: "Check-In"
        description: "Brief intake with vitals. Bring insurance card and list of current medications."
        icon: clipboard-check
      - step: 3
        title: "Ear Examination"
        description: "Otoscope exam to check for fluid, redness, and eardrum position. Takes 5 minutes."
        icon: search
      - step: 4
        title: "Diagnosis and Plan"
        description: "Doctor explains findings and recommends treatment: antibiotics, watchful waiting, or referral."
        icon: file-medical
      - step: 5
        title: "Follow-Up"
        description: "Recheck in 2-3 weeks to confirm infection resolved. Hearing check if needed."
        icon: calendar-check

  # Row 6: MID_CTA (NEW BLOCK)
  # Progressive CTA Stage 3: Social Proof
  - block: MID_CTA
    trust_point: "Trusted by Gotham families since 2015"
    cta:
      text: "Schedule Your Child's Visit"  # Stage 3: Social proof
      variant: primary
    layout: "slim full-width bar, py-3"

  # Row 7: LOCAL_KNOWLEDGE (NEW BLOCK)
  - block: LOCAL_KNOWLEDGE
    title: "Why Gotham Children Get More Ear Infections"
    local_factors:
      - factor: "Cedar fever season (December through February)"
        connection: "Causes sinus inflammation that blocks Eustachian tubes, trapping fluid behind the eardrum"
        data_point: "Gotham County sees a 30% spike in pediatric ENT visits during cedar season"
      - factor: "Ragweed season (August through November)"
        connection: "Second allergy wave causes chronic congestion leading to recurrent ear infections"
        data_point: "North Texas ragweed counts regularly exceed 1,000 grains per cubic meter"
      - factor: "High daycare density in family-heavy suburbs"
        connection: "Group childcare increases upper respiratory infection exposure, the primary trigger for ear infections"
    anti_slop_note: "All seasonal data verified against local allergy reports. Named allergens, specific date ranges, measurable pollen counts."
    meclabs: [value_prop_3x, -anxiety_2x]

  # Row 8: MEET_THE_TEAM (NEW BLOCK)
  - block: MEET_THE_TEAM
    providers:
      - name: "Dr. Jane Smith, MD"
        title: "Board-Certified Pediatrician"
        credentials:
          - "MD, UT Southwestern Medical Center"
          - "Residency, Children's Medical Center Dallas"
          - "Board Certified, American Board of Pediatrics"
        specialties: ["Acute illness", "Newborn care", "Developmental screening"]
        languages: ["English", "Spanish", "Mandarin"]
        years_experience: 12
      - name: "Dr. Michael Chen, MD"
        title: "Board-Certified Pediatrician"
        credentials:
          - "MD, Baylor College of Medicine"
          - "Board Certified, American Board of Pediatrics"
        specialties: ["Ear/nose/throat concerns", "Allergy management", "Preventive care"]
        languages: ["English", "Vietnamese"]
        years_experience: 8
    meclabs: [value_prop_3x, -anxiety_2x]

  # Row 9: REVIEWS
  - block: REVIEWS_CAROUSEL
    aggregate: "5.0 stars from 80+ Google reviews"
    reviews:
      - quote: "Dr. Smith diagnosed my daughter's ear infection in 10 minutes and had us out with a prescription in under 30. We were seen same day."
        name: "Maria L."
        location: "Gotham, TX"
        date: "January 2026"
      - quote: "My son had his third ear infection in 4 months. Dr. Chen referred us to a great ENT and followed up twice to make sure the tubes helped. Above and beyond."
        name: "James K."
        location: "Gotham, TX"
        date: "November 2025"
      - quote: "Being able to speak Mandarin with Dr. Smith made my mother-in-law so much more comfortable explaining our baby's symptoms. That matters."
        name: "Wei T."
        location: "Gotham, TX"
        date: "February 2026"
      - quote: "Called at 3pm with a screaming toddler. They fit us in at 3:45. Ear infection confirmed, antibiotic prescribed, home by 4:30. This is how pediatrics should work."
        name: "Sarah M."
        location: "Gotham, TX"
        date: "March 2026"

  # Row 10: FAQ with <details> pattern + JSON-LD
  # Progressive CTA Stage 4: Objection-Handling (sidebar CTA)
  - block: FAQ
    html_pattern: details_element
    structured_data: true  # Generate FAQPage JSON-LD
    questions:
      - q: "How do I know if my child has an ear infection or is just teething?"
        a: "Teething and ear infections can look similar in babies. Key differences: fever plus ear pulling likely indicates infection. Drooling plus chewing on objects is more likely teething. If fever is above 100.4F, call us."
        category: process
      - q: "Will my child need antibiotics?"
        a: "Not always. AAP guidelines recommend watchful waiting for children over 2 with mild symptoms. For children under 2 or with severe symptoms (high fever, bilateral infection), antibiotics are typically prescribed. Dr. Smith or Dr. Chen will explain the reasoning for your child."
        category: process
      - q: "How quickly can we be seen?"
        a: "Same-day sick visits available Monday through Friday. Call before 4pm and we can usually see your child that afternoon. Average wait time is 15 minutes past your appointment."
        category: speed
      - q: "What insurance do you accept?"
        a: "We accept most major plans including Blue Cross Blue Shield, Aetna, Cigna, United Healthcare, and Texas Medicaid/CHIP. Call us with your plan details and we will verify coverage before your visit."
        category: insurance
      - q: "When should ear infections be treated by an ENT specialist?"
        a: "We refer to ENT if your child has 3 or more infections in 6 months, or 4 or more in 12 months. Also if fluid persists behind the eardrum for 3+ months or if hearing is affected. Dr. Chen coordinates directly with local ENT specialists for seamless referrals."
        category: process
      - q: "Can ear infections cause hearing loss?"
        a: "Temporary hearing reduction during active infection is common and usually resolves within 2 to 3 weeks after treatment. Chronic untreated infections or persistent fluid can affect speech development in young children, which is why we schedule follow-up rechecks."
        category: trust
    sidebar_cta:
      text: "Still have questions? Call us"  # Stage 4: Objection-handling
      phone: "(555) 425-3600"

  # Row 11: MAP_CONTACT
  - block: MAP_CONTACT
    address: "5575 Warren Pkwy Suite 116, Gotham TX 75034"
    phone: "(555) 425-3600"
    hours: "Monday-Friday 8am-5pm"
    zip_codes: ["75033", "75034", "75035", "75036"]

  # Row 12: FINAL_CTA
  # Progressive CTA Stage 5: Closing Argument
  - block: FINAL_CTA
    heading: "Same-Day Ear Infection Relief for Your Child"  # Stage 5: Closing argument referencing what they learned
    subhead: "Board-certified pediatricians, same-day sick visits, on-site diagnosis"
    ctas:
      - text: "Call (555) 425-3600"
        variant: primary
      - text: "Book Online"
        variant: outline-light

  # Mobile: STICKY_CTA
  - block: STICKY_CTA
    buttons:
      - "Call Now"
      - "Book Online"

---
# Progressive CTA Stages Used:
#   Stage 1 (Hero): "Call (555) 425-3600" - direct intent match
#   Stage 2 (After symptom content): implied by PROCESS_TIMELINE CTA
#   Stage 3 (MID_CTA): "Schedule Your Child's Visit" - social proof bar
#   Stage 4 (FAQ sidebar): "Still have questions? Call us" - objection handling
#   Stage 5 (FINAL_CTA): "Same-Day Ear Infection Relief" - closing argument
#
# New Blocks Demonstrated:
#   MEET_THE_TEAM: 2 providers with full credentials, languages, specialties
#   LOCAL_KNOWLEDGE: 3 verifiable local factors (cedar, ragweed, daycare density)
#   MID_CTA: Slim trust bar with single CTA
#   FAQ: <details> pattern with JSON-LD schema
#
# Anti-Slop Rules Applied:
#   Rule 1: All blocks populated with real data (no generic filler)
#   Rule 2: No vague adjectives without evidence
#   Rule 3: Local references: Gotham County, UT Southwestern, cedar/ragweed seasons, zip codes
#   Rule 4: Quantified: "30% spike", "1,000 grains/m3", "3+ in 6 months", "15 minutes"
#   Rule 5: Every claim is falsifiable and specific to this practice
