            buttons:
              - text: "Schedule Consultation"
                href: "#schedule"
                classes: ["btn", "btn-light", "btn-lg"]
              - text: "Call (469) 555-6789"
                href: "tel:4695556789"
                classes: ["btn", "btn-outline-light", "btn-lg"]

            classes_buttons: ["d-flex", "justify-content-center", "flex-wrap", "gap-3", "mt-3"]

    # ROW 10: FINAL_CTA
    - id: final_cta
      container: fluid
      layout: single_column
      classes: ["py-5", "bg-gradient-primary", "text-white", "text-center"]
      blocks:
        - type: FINAL_CTA
          column: {xs: 12}
          content:
            heading: "Start Your Implant Journey Today"
            subheading: "Free consultation • 0% financing available • 1,200+ successful implants"
            buttons:
              - text: "Schedule Free Consultation"
                href: "#schedule"
                classes: ["btn", "btn-light", "btn-lg"]
              - text: "Call (469) 555-6789"
                href: "tel:4695556789"
                classes: ["btn", "btn-outline-light", "btn-lg"]

            trust_reinforcement: "Serving Frisco & North Dallas since 2005 • Board Certified Implant Dentist"
            classes_buttons: ["d-flex", "justify-content-center", "flex-wrap", "gap-3", "mt-4"]
            classes_trust: ["small", "mt-3", "text-white-50"]

  # NO STICKY CTA for research intent
