              - type: "in-person"
                label: "In-Person Consultation"
                duration: "60 minutes"
                includes: "Exam, 3D imaging, treatment plan"
              - type: "virtual"
                label: "Virtual Consultation"
                duration: "30 minutes"
                includes: "Video call, preliminary questions"
            classes_container: ["card", "shadow-sm", "p-4"]

            privacy_adjacent: true

            meclabs_contribution:
              reduces: ["friction_2x"]

    # ROW 9: PRIMARY_CTAS
    - id: cta_mid
      container: standard
      layout: single_column
      classes: ["py-5", "text-center", "bg-primary", "text-white"]
      blocks:
